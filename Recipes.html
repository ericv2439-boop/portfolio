<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foods, Diets & Recipes</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f7f7f7;
        }
        h1 {
            text-align: center;
            color: #2c3e50;
        }
        table {
            width: 90%;
            margin: 20px auto;
            border-collapse: collapse;
            background-color: #fff;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        th, td {
            padding: 12px 15px;
            border: 1px solid #ddd;
            text-align: left;
        }
        th {
            background-color: #2c3e50;
            color: #fff;
        }
        td a {
            color: #2980b9;
            text-decoration: none;
        }
        td a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <h1>Foods, Diets & Recipes</h1>

    <table>
        <thead>
            <tr>
                <th>Food</th>
                <th>Diet Type</th>
                <th>Recipe</th>
                <th>Wikipedia</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Quinoa</td>
                <td>Vegan, Gluten-Free</td>
                <td><a href="https://www.allrecipes.com/recipe/229156/quinoa-salad/" target="_blank">Quinoa Salad</a></td>
                <td><a href="https://en.wikipedia.org/wiki/Quinoa" target="_blank">Search</a></td>
            </tr>
            <tr>
                <td>Salmon</td>
                <td>Keto, Paleo</td>
                <td><a href="https://www.allrecipes.com/recipe/12720/grilled-salmon-i/" target="_blank">Grilled Salmon</a></td>
                <td><a href="https://en.wikipedia.org/wiki/Salmon" target="_blank">Search</a></td>
            </tr>
            <tr>
                <td>Avocado</td>
                <td>Vegan, Keto</td>
                <td><a href="https://www.allrecipes.com/recipe/245481/avocado-toast/" target="_blank">Avocado Toast</a></td>
                <td><a href="https://en.wikipedia.org/wiki/Avocado" target="_blank">Search</a></td>
            </tr>
        </tbody>
    </table>

</body>
</html>
